      - carbon nanotube (CNT)-reinforced polymer composite
      - carbon nanotube (CNT)-reinforced polymer composites
      - carbon nanotube-reinforced polymer composite
      - carbon nanotube-reinforced polymer composites
      - carbon nanotube-reinforced epoxy composite
      - carbon nanotube-reinforced epoxy composites

  epoxy matrix:
