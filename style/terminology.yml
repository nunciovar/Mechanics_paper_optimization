# Project terminology guard.
#
# This file intentionally uses a small, predictable YAML subset so the
# repository scripts can parse it without external dependencies.
# 中文：本文件使用简单稳定的 YAML 子集，方便脚本在无外部依赖时解析。
# Keep this as readable multi-line YAML: preferred_terms -> canonical -> variants.

preferred_terms:
  CNT:
    canonical: CNT
    variants:
      - CNT
      - CNTs
      - carbon nanotube
      - carbon nanotubes

  CNTRPs:
    canonical: CNTRPs
    variants:
      - CNTRP
      - CNTRPs
      - carbon nanotube-reinforced polymer
      - carbon nanotube-reinforced polymers

  PD:
    canonical: PD
    variants:
      - PD
      - peridynamics

  carbon nanotube-reinforced polymer composite:
